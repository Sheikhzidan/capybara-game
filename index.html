<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- Play.fun SDK -->
<meta name="x-ogp-key" content="d0462b53-483e-409d-a626-41dce5ad6a4d" />
<script src="https://sdk.play.fun"></script>

<title>Capybara Island V3</title>
<style>
* { box-sizing: border-box; }
body{
margin:0;
height:100vh;
display:grid;
place-items:center;
background: radial-gradient(circle at 20% 10%, #21395b 0%, #0f1c2f 55%, #0a1220 100%);
font-family: Inter, Arial, sans-serif;
overflow:hidden;
color:#fff;
}
canvas{
width:min(96vw, 980px);
height:auto;
border-radius:18px;
border:1px solid rgba(255,255,255,.14);
box-shadow:0 20px 70px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.05);
background:#7ecff8;
cursor:pointer;
}
</style>
</head>
<body>
<canvas id="game" width="980" height="560"></canvas>

<script>
/* ================= SDK ================= */
const GAME_ID = "562396db-e86e-4537-b5a3-2a1dbdb39778";
const ogp = new OpenGameSDK({
ui: { usePointsWidget: true, theme: "dark" },
logLevel: "warn"
});

let sdkReady = false;
ogp.on("OnReady", () => { sdkReady = true; console.log("SDK ready"); });
ogp.on("SavePointsSuccess", () => console.log("SavePointsSuccess"));
ogp.on("SavePointsFailed", (e) => console.log("SavePointsFailed", e));
ogp.on("SavePointsCancelled", () => console.log("SavePointsCancelled"));

ogp.init({ gameId: GAME_ID });

function addSdkPoints(n){
if (!sdkReady || n <= 0) return;
try { ogp.addPoints(n); } catch {}
}
async function commitRound(){
if (!sdkReady) return;
try { await ogp.endGame(); } catch {}
}

/* ================= GAME ================= */
const cv = document.getElementById("game");
const ctx = cv.getContext("2d");

let run = true;
let inCommit = false;
let keys = {}, touch = null, isVisible = true;

let score = 0;
let lives = 3;
let roundLeft = 60;
let combo = 1;
let comboTimer = 0;
let missionText = "";
let missionTarget = 20;
let missionProgress = 0;
let missionReward = 100;
let fruitsCollected = 0;
let streak = Number(localStorage.getItem("capy_streak") || 1);

const p = { x:140, y:410, w:76, h:46, s:5.3 };
let fruits = [], rocks = [], particles = [];
let shake = 0;
let lastMoveAt = Date.now();

const clouds = Array.from({length:8}, (_,i)=>({
x:Math.random()*980, y:40+i*25+Math.random()*18, s:.2+Math.random()*.25
}));

function R(a,b){ return Math.random()*(b-a)+a; }
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function spawnFruit(){
fruits.push({ x:R(70,910), y:R(270,520), r:10, bob:R(0,Math.PI*2) });
}
function spawnRock(){
rocks.push({ x:R(90,900), y:R(290,530), r:R(13,18), vx:R(-1.2,1.2), vy:R(-1,1) });
}
function burst(x,y,color="#ffd166",count=14){
for(let i=0;i<count;i++){
particles.push({ x,y,vx:R(-2.4,2.4),vy:R(-2.4,2.4),life:30,c:color });
}
}
function hitRectCircle(px,py,pw,ph,cx,cy,cr){
const tx = clamp(cx, px, px+pw), ty = clamp(cy, py, py+ph);
const dx = cx-tx, dy = cy-ty;
return dx*dx + dy*dy <= cr*cr;
}
function newMission(){
const targets = [15,20,25,30];
missionTarget = targets[Math.floor(Math.random()*targets.length)];
missionReward = missionTarget * 5;
missionProgress = 0;
missionText = `Collect ${missionTarget} fruits`;
}

function resetRound(){
score = 0;
lives = 3;
roundLeft = 60;
combo = 1;
comboTimer = 0;
fruitsCollected = 0;
p.x = 140; p.y = 410;
fruits = []; rocks = []; particles = [];
for(let i=0;i<9;i++) spawnFruit();
for(let i=0;i<5;i++) spawnRock();
newMission();
}

/* ======= Drawing ======= */
function drawCloud(cl){
ctx.fillStyle="rgba(255,255,255,.72)";
ctx.beginPath();
ctx.arc(cl.x,cl.y,18,0,Math.PI*2);
ctx.arc(cl.x+25,cl.y-8,23,0,Math.PI*2);
ctx.arc(cl.x+50,cl.y,18,0,Math.PI*2);
ctx.fill();
}
function drawBG(){
const g = ctx.createLinearGradient(0,0,0,560);
g.addColorStop(0,"#8fdcff");
g.addColorStop(.55,"#7fd0f2");
g.addColorStop(.55,"#78c96e");
g.addColorStop(1,"#67bf61");
ctx.fillStyle = g;
ctx.fillRect(0,0,980,560);

// sun
const sun = ctx.createRadialGradient(850,90,15,850,90,85);
sun.addColorStop(0,"rgba(255,255,230,.95)");
sun.addColorStop(1,"rgba(255,255,230,0)");
ctx.fillStyle = sun;
ctx.beginPath(); ctx.arc(850,90,85,0,Math.PI*2); ctx.fill();
ctx.fillStyle="rgba(255,255,255,.85)";
ctx.beginPath(); ctx.arc(850,90,26,0,Math.PI*2); ctx.fill();

// parallax clouds
clouds.forEach(cl=>{
drawCloud(cl);
cl.x += cl.s;
if(cl.x > 1060) cl.x = -90;
});

// grass + river
ctx.fillStyle="#75c96b"; ctx.fillRect(0,290,980,120);
ctx.fillStyle="#68be60";
ctx.beginPath();
ctx.moveTo(0,410); ctx.lineTo(980,380); ctx.lineTo(980,440); ctx.lineTo(0,440);
ctx.closePath(); ctx.fill();

const rg = ctx.createLinearGradient(0,400,0,470);
rg.addColorStop(0,"#4dc1f8"); rg.addColorStop(1,"#3fa9e2");
ctx.fillStyle=rg; ctx.fillRect(0,400,980,70);

ctx.fillStyle="rgba(255,255,255,.2)";
ctx.fillRect(0,413,980,4); ctx.fillRect(0,440,980,3);

ctx.fillStyle="#6ac464";
ctx.beginPath();
ctx.moveTo(0,470); ctx.lineTo(980,450); ctx.lineTo(980,560); ctx.lineTo(0,560);
ctx.closePath(); ctx.fill();
}
function drawFruit(f){
const yy = f.y + Math.sin(f.bob)*3; f.bob += .05;
ctx.fillStyle="#ff7a45";
ctx.beginPath(); ctx.arc(f.x,yy,f.r,0,Math.PI*2); ctx.fill();
ctx.fillStyle="#2f8a3e"; ctx.fillRect(f.x-2,yy-f.r-6,4,7);
ctx.fillStyle="rgba(255,255,255,.35)";
ctx.beginPath(); ctx.arc(f.x-3,yy-3,3,0,Math.PI*2); ctx.fill();
}
function drawRock(r){
ctx.fillStyle="#7b818a";
ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.fill();
ctx.fillStyle="rgba(255,255,255,.18)";
ctx.beginPath(); ctx.arc(r.x-3,r.y-4,r.r*.35,0,Math.PI*2); ctx.fill();
}
function drawCapy(){
ctx.fillStyle="rgba(0,0,0,.2)";
ctx.beginPath(); ctx.ellipse(p.x+p.w/2,p.y+p.h+7,p.w*.46,7,0,0,Math.PI*2); ctx.fill();

ctx.fillStyle="#8b665a"; ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.fillStyle="#795548"; ctx.fillRect(p.x+p.w-10,p.y+8,23,22);
ctx.fillStyle="#5e3f36";
ctx.fillRect(p.x+8,p.y+p.h-3,10,7); ctx.fillRect(p.x+p.w-20,p.y+p.h-3,10,7);
ctx.fillStyle="#141414"; ctx.fillRect(p.x+p.w+5,p.y+15,3,3);
ctx.fillStyle="rgba(255,255,255,.24)"; ctx.fillRect(p.x+6,p.y+6,14,4);
}
function drawParticles(){
for(let i=particles.length-1;i>=0;i--){
const z = particles[i];
z.x += z.vx; z.y += z.vy; z.life--;
ctx.globalAlpha = Math.max(0, z.life/30);
ctx.fillStyle = z.c; ctx.fillRect(z.x,z.y,3,3);
if(z.life<=0) particles.splice(i,1);
}
ctx.globalAlpha = 1;
}
function drawHUD(){
// top left panel
ctx.fillStyle="rgba(12,18,28,.45)";
ctx.fillRect(14,14,360,88);
ctx.strokeStyle="rgba(255,255,255,.16)";
ctx.strokeRect(14,14,360,88);

ctx.fillStyle="#fff";
ctx.font="bold 22px Inter, Arial";
ctx.fillText(`Score: ${score}`, 24, 42);
ctx.fillText(`Time: ${roundLeft}s`, 24, 68);

ctx.font="bold 18px Inter, Arial";
ctx.fillText(`Combo: x${combo}`, 190, 42);
ctx.fillText(`Streak: ${streak}`, 190, 68);

// mission
ctx.fillStyle="rgba(12,18,28,.42)";
ctx.fillRect(14,110,360,52);
ctx.strokeStyle="rgba(255,255,255,.14)";
ctx.strokeRect(14,110,360,52);
ctx.fillStyle="#fff";
ctx.font="bold 16px Inter, Arial";
ctx.fillText(`Mission: ${missionText} (${missionProgress}/${missionTarget})`, 24, 140);
}

function render(){
const s = Math.max(0, shake);
ctx.save();
ctx.translate((Math.random()-.5)*s, (Math.random()-.5)*s);

drawBG();
fruits.forEach(drawFruit);
rocks.forEach(drawRock);
drawCapy();
drawParticles();
drawHUD();

ctx.restore();
shake *= 0.85;
}

/* ======= Loop ======= */
function gameLoop(){
if(!run || inCommit) return;

let moved = false;
if(keys["ArrowLeft"]||keys["a"]||keys["A"]){ p.x-=p.s; moved=true; }
if(keys["ArrowRight"]||keys["d"]||keys["D"]){ p.x+=p.s; moved=true; }
if(keys["ArrowUp"]||keys["w"]||keys["W"]){ p.y-=p.s; moved=true; }
if(keys["ArrowDown"]||keys["s"]||keys["S"]){ p.y+=p.s; moved=true; }

if(touch){
const dx = touch.x - (p.x+p.w/2), dy = touch.y - (p.y+p.h/2);
p.x += Math.sign(dx)*Math.min(Math.abs(dx),p.s);
p.y += Math.sign(dy)*Math.min(Math.abs(dy),p.s);
moved = true;
}
if(moved) lastMoveAt = Date.now();

p.x = clamp(p.x, 14, 980-p.w-14);
p.y = clamp(p.y, 260, 560-p.h-14);

rocks.forEach(r=>{
r.x += r.vx; r.y += r.vy;
if(r.x<22||r.x>958) r.vx*=-1;
if(r.y<275||r.y>540) r.vy*=-1;
});

// combo decay
if(comboTimer>0) comboTimer--;
else combo = 1;

// fruit collect
for(let i=fruits.length-1;i>=0;i--){
const f = fruits[i];
if(hitRectCircle(p.x,p.y,p.w,p.h,f.x,f.y,f.r)){
combo = Math.min(combo+1, 5);
comboTimer = 180; // ~3 sec
const gained = 10 * combo;

score += gained;
addSdkPoints(gained);

fruitsCollected++;
missionProgress++;
burst(f.x,f.y,"#ffd166",16);

fruits.splice(i,1);
spawnFruit();

// mission complete
if(missionProgress >= missionTarget){
score += missionReward;
addSdkPoints(missionReward);
streak++;
localStorage.setItem("capy_streak", String(streak));
missionProgress = 0;
burst(p.x+p.w/2,p.y,"#8bffb0",24);
newMission();
}
}
}

// rock hit
for(const r of rocks){
if(hitRectCircle(p.x,p.y,p.w,p.h,r.x,r.y,r.r)){
lives--;
combo = 1;
shake = 8;
burst(p.x+p.w/2,p.y+p.h/2,"#ff6b6b",18);
p.x = 140; p.y = 410;
if(lives<=0) lives = 3; // auto-continue
break;
}
}

render();
requestAnimationFrame(gameLoop);
}

/* ======= Timers ======= */

// idle + active small reward
setInterval(()=>{
if(!run || inCommit || !isVisible) return;
let gained = 1;
if(Date.now()-lastMoveAt < 4000) gained += 1;
score += gained;
addSdkPoints(gained);
}, 3000);

// round timer + auto commit
setInterval(async ()=>{
if(!run || inCommit) return;
roundLeft--;
if(roundLeft <= 0){
inCommit = true;
run = false;
await commitRound();
resetRound();
inCommit = false;
run = true;
requestAnimationFrame(gameLoop);
}
}, 1000);

/* ======= Inputs ======= */
document.addEventListener("visibilitychange",()=>{ isVisible = document.visibilityState==="visible"; });
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

cv.addEventListener("touchstart",(e)=>{
e.preventDefault();
const t=e.touches[0], r=cv.getBoundingClientRect();
touch={x:t.clientX-r.left,y:t.clientY-r.top};
},{passive:false});

cv.addEventListener("touchmove",(e)=>{
e.preventDefault();
const t=e.touches[0], r=cv.getBoundingClientRect();
touch={x:t.clientX-r.left,y:t.clientY-r.top};
},{passive:false});

cv.addEventListener("touchend",()=>{ touch=null; });

/* ======= Start ======= */
resetRound();
render();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
