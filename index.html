<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="x-ogp-key" content="d0462b53-483e-409d-a626-41dce5ad6a4d" />
<script src="https://sdk.play.fun"></script>
<title>Capybara Radio Lounge Pro</title>
<style>
*{box-sizing:border-box}
body{
margin:0; min-height:100vh; color:#fff;
font-family:Inter,Arial,sans-serif;
background: radial-gradient(circle at 20% 20%, #1e3454 0%, #0f1d33 55%, #0a1324 100%);
display:grid; place-items:center; padding:16px;
transition: background .3s ease;
}
.card{
width:min(760px, 96vw);
background:rgba(10,18,32,.45);
border:1px solid rgba(255,255,255,.14);
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.45);
padding:18px;
backdrop-filter: blur(4px);
}
.title{font-size:28px;font-weight:800;margin:0 0 6px}
.sub{opacity:.8;margin:0 0 14px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.pill{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
border-radius:12px;
padding:10px 12px;
min-width:145px;
font-weight:700;
}
.radio{
margin-top:14px;
background:linear-gradient(135deg,#243b5c,#1a2942);
border:1px solid rgba(255,255,255,.14);
border-radius:16px;
padding:14px;
}
.btn{
border:0;border-radius:12px;padding:10px 14px;font-weight:800;cursor:pointer;
background:#ffd84d;color:#111;
}
.btn:disabled{opacity:.5;cursor:not-allowed}
.muted{opacity:.75;font-size:13px}
.task{
margin-top:14px;
background:rgba(255,255,255,.06);
border:1px dashed rgba(255,255,255,.25);
border-radius:12px;
padding:12px;
}
.bar{
margin-top:8px;height:8px;border-radius:999px;background:rgba(255,255,255,.15);overflow:hidden
}
.fill{height:100%;width:0%;background:#7df9a6;transition:width .2s}
#viz{
margin-top:10px;width:100%;height:auto;border-radius:10px;
background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
}
</style>
</head>
<body>
<div class="card">
<h1 class="title">Capybara Radio Lounge 🐹📻</h1>
<p class="sub">Now: Lo-fi • Open রাখো, chill করো, points earn করো.</p>

<div class="row">
<div class="pill">Points: <span id="points">0</span></div>
<div class="pill">Streak: <span id="streak">1</span></div>
<div class="pill">Hourly Chest: <span id="chest">60m</span></div>
<div class="pill">Station: <span id="stationName">Lo-fi</span></div>
</div>

<div class="radio">
<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap">
<div>
<div style="font-weight:800">Capybara FM</div>
<div class="muted">Passive points while tab open</div>
</div>
<button id="toggleRadio" class="btn">⏸️ Pause Radio</button>
</div>

<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
<button id="st1" class="btn">Lo-fi</button>
<button id="st2" class="btn">Rain</button>
<button id="st3" class="btn">Cafe</button>
<button id="nightBtn" class="btn">🌙 Night</button>
</div>

<canvas id="viz" width="700" height="80"></canvas>
</div>

<div class="task">
<div style="font-weight:700">Bonus Task: Tap 10 times in 20s → +3 points</div>
<div class="muted" id="taskState">Task starts in 60s</div>
<div class="bar"><div id="taskFill" class="fill"></div></div>
<div style="margin-top:8px"><button id="tapBtn" class="btn" disabled>Tap</button></div>
</div>
</div>

<script>
/* ========= SDK ========= */
const GAME_ID = "562396db-e86e-4537-b5a3-2a1dbdb39778";
const ogp = new OpenGameSDK({
ui: { usePointsWidget: true, theme: "dark" },
logLevel: "warn"
});
let sdkReady = false;
ogp.on("OnReady", () => { sdkReady = true; });
ogp.init({ gameId: GAME_ID });

function addPointsSDK(n){
if (!sdkReady || n <= 0) return;
try { ogp.addPoints(n); } catch {}
}
async function commitPoints(){
if (!sdkReady) return;
try { await ogp.endGame(); } catch {}
}

/* ========= UI refs ========= */
const pointsEl = document.getElementById("points");
const streakEl = document.getElementById("streak");
const chestEl = document.getElementById("chest");
const stationNameEl = document.getElementById("stationName");
const toggleRadio = document.getElementById("toggleRadio");
const tapBtn = document.getElementById("tapBtn");
const taskState = document.getElementById("taskState");
const taskFill = document.getElementById("taskFill");
const st1 = document.getElementById("st1");
const st2 = document.getElementById("st2");
const st3 = document.getElementById("st3");
const nightBtn = document.getElementById("nightBtn");
const sub = document.querySelector(".sub");
const viz = document.getElementById("viz");
const vz = viz.getContext("2d");

/* ========= State ========= */
let points = Number(localStorage.getItem("cr_points") || 0);
let streak = Number(localStorage.getItem("cr_streak") || 1);
let chestMinutes = Number(localStorage.getItem("cr_chest_min") || 60);
let isVisible = document.visibilityState === "visible";
let radioOn = true; // AUTO ON
let station = "Lo-fi";
let night = false;

// bonus task
let taskActive = false;
let taskTapCount = 0;
let taskLeft = 0;
const TASK_NEED = 10;
const TASK_SECONDS = 20;

/* ========= Daily streak ========= */
(function applyDailyStreak(){
const today = new Date().toDateString();
const key = "cr_last_day";
const last = localStorage.getItem(key);
if (last !== today) {
streak = Math.min(streak + 1, 30);
localStorage.setItem("cr_streak", String(streak));
localStorage.setItem(key, today);

const bonus = streak * 5;
points += bonus;
addPointsSDK(bonus);
}
})();

function ui(){
pointsEl.textContent = points.toFixed(1);
streakEl.textContent = streak;
chestEl.textContent = `${chestMinutes}m`;
stationNameEl.textContent = station;
}
ui();
toggleRadio.textContent = "⏸️ Pause Radio";

/* ========= Station + theme ========= */
function setStation(name){
station = name;
sub.textContent = `Now: ${station} • Open রাখো, chill করো, points earn করো.`;
ui();
}
st1.onclick = ()=>setStation("Lo-fi");
st2.onclick = ()=>setStation("Rain");
st3.onclick = ()=>setStation("Cafe");

nightBtn.onclick = ()=>{
night = !night;
document.body.style.background = night
? "radial-gradient(circle at 20% 20%, #151f33 0%, #0a101c 60%, #070b12 100%)"
: "radial-gradient(circle at 20% 20%, #1e3454 0%, #0f1d33 55%, #0a1324 100%)";
};

/* ========= Radio ========= */
toggleRadio.onclick = () => {
radioOn = !radioOn;
toggleRadio.textContent = radioOn ? "⏸️ Pause Radio" : "▶️ Start Radio";
};

document.addEventListener("visibilitychange", () => {
isVisible = document.visibilityState === "visible";
});

/* ========= Idle points ========= */
setInterval(() => {
if (!radioOn) return;
const gain = isVisible ? 1 : 0.5;
points += gain;
addPointsSDK(gain);
localStorage.setItem("cr_points", String(points));
ui();
}, 30000);

/* ========= Auto commit প্রতি 60 sec ========= */
setInterval(async () => {
if (!radioOn) return;
await commitPoints();
}, 60000);

/* ========= Hourly chest ========= */
setInterval(() => {
if (!radioOn) return;
chestMinutes--;
if (chestMinutes <= 0) {
chestMinutes = 60;
points += 20;
addPointsSDK(20);
}
localStorage.setItem("cr_chest_min", String(chestMinutes));
localStorage.setItem("cr_points", String(points));
ui();
}, 60000);

/* ========= Bonus task ========= */
setInterval(() => {
if (!radioOn || taskActive) return;

taskActive = true;
taskTapCount = 0;
taskLeft = TASK_SECONDS;
tapBtn.disabled = false;
taskState.textContent = `Tap ${TASK_NEED} times in ${TASK_SECONDS}s`;

const t = setInterval(() => {
taskLeft--;

const progress = Math.min(100, (taskTapCount / TASK_NEED) * 100);
taskFill.style.width = progress + "%";

taskState.textContent = taskTapCount >= TASK_NEED
? "Done! wait for reward..."
: `Tap ${TASK_NEED} times in ${taskLeft}s`;

if (taskTapCount >= TASK_NEED) {
clearInterval(t);
taskActive = false;
tapBtn.disabled = true;
taskFill.style.width = "100%";

points += 3;
addPointsSDK(3);
localStorage.setItem("cr_points", String(points));
taskState.textContent = "✅ Bonus +3 points! Next task in ~60s";
ui();

setTimeout(()=>{ taskFill.style.width = "0%"; }, 1200);
} else if (taskLeft <= 0) {
clearInterval(t);
taskActive = false;
tapBtn.disabled = true;
taskFill.style.width = "0%";
taskState.textContent = "❌ Missed. Next task in ~60s";
}
}, 1000);

}, 60000);

tapBtn.onclick = () => {
if (!taskActive) return;
taskTapCount++;
};

/* ========= Visualizer ========= */
function drawViz(){
vz.clearRect(0,0,viz.width,viz.height);

for(let i=0;i<64;i++){
const wave = (Math.sin((Date.now()/220)+(i*0.35))+1)*18;
const h = wave + (radioOn ? 14 : 2);
vz.fillStyle = `hsla(${180+i*2}, 85%, 65%, .9)`;
vz.fillRect(i*10+8, viz.height-h-6, 7, h);
}

requestAnimationFrame(drawViz);
}
drawViz();

/* ========= Final save ========= */
window.addEventListener("beforeunload", () => {
commitPoints();
});
</script>
</body>
</html>
