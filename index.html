<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="x-ogp-key" content="d0462b53-483e-409d-a626-41dce5ad6a4d" />
<script src="https://sdk.play.fun"></script>
<title>Capybara Village V5</title>
<style>
*{box-sizing:border-box}
body{margin:0;height:100vh;display:grid;place-items:center;background:#0b1220;font-family:Inter,Arial,sans-serif}
canvas{width:min(96vw,980px);height:auto;border-radius:18px;border:1px solid rgba(255,255,255,.16);box-shadow:0 20px 60px rgba(0,0,0,.5)}
</style>
</head>
<body>
<canvas id="game" width="980" height="560"></canvas>
<script>
/* SDK */
const GAME_ID = "562396db-e86e-4537-b5a3-2a1dbdb39778";
const ogp = new OpenGameSDK({ ui:{usePointsWidget:true, theme:"dark"}, logLevel:"warn" });
let sdkReady=false;
ogp.on("OnReady",()=>sdkReady=true);
ogp.init({ gameId: GAME_ID });
const addPts=n=>{ if(sdkReady&&n>0) try{ogp.addPoints(n)}catch{} };
const commit=async()=>{ if(sdkReady) try{await ogp.endGame()}catch{} };

/* State */
const cv=document.getElementById("game"), ctx=cv.getContext("2d");
let keys={}, run=true, score=0, timeLeft=60, combo=1, comboT=0;
let fruits=[], rocks=[], touch=null, eventName="None", eventLeft=0;
let skin=localStorage.getItem("capy_skin")||"brown";
let streak=Number(localStorage.getItem("capy_streak")||1);
let mission={ target:20, progress:0, reward:120 };
const p={x:140,y:410,w:76,h:46,s:5.2};

/* Helpers */
const R=(a,b)=>Math.random()*(b-a)+a;
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function spawnFruit(){ fruits.push({x:R(70,910),y:R(280,520),r:10,b:R(0,Math.PI*2)}); }
function spawnRock(){ rocks.push({x:R(90,900),y:R(290,530),r:R(13,18),vx:R(-1.2,1.2),vy:R(-1,1)}); }
function hitRectCircle(px,py,pw,ph,cx,cy,cr){
const tx=clamp(cx,px,px+pw), ty=clamp(cy,py,py+ph), dx=cx-tx, dy=cy-ty;
return dx*dx+dy*dy<=cr*cr;
}
function newMission(){
const t=[15,20,25,30][Math.floor(Math.random()*4)];
mission={ target:t, progress:0, reward:t*6 };
}
function applyDailyStreak(){
const k="capy_last_day", today=new Date().toDateString(), last=localStorage.getItem(k);
if(last!==today){ streak=Math.min(streak+1,30); localStorage.setItem("capy_streak",streak); localStorage.setItem(k,today); }
}
function unlockSkinByScore(){
if(score>=2000 && skin==="brown"){ skin="neon"; localStorage.setItem("capy_skin",skin); }
if(score>=5000 && skin==="neon"){ skin="royal"; localStorage.setItem("capy_skin",skin); }
}
function startEvent(){
const pool=["Golden Rain","Fever Mode","Calm Flow"];
eventName=pool[Math.floor(Math.random()*pool.length)];
eventLeft=20; // sec
}

/* Draw */
function drawBG(){
const g=ctx.createLinearGradient(0,0,0,560);
g.addColorStop(0,"#8fdcff"); g.addColorStop(.55,"#7fd0f2"); g.addColorStop(.55,"#78c96e"); g.addColorStop(1,"#67bf61");
ctx.fillStyle=g; ctx.fillRect(0,0,980,560);
ctx.fillStyle="#4dc1f8"; ctx.fillRect(0,400,980,70);
}
function drawCapy(){
let body="#8b665a"; if(skin==="neon") body="#6df7ff"; if(skin==="royal") body="#c9a227";
ctx.fillStyle=body; ctx.fillRect(p.x,p.y,p.w,p.h);
ctx.fillStyle="#222"; ctx.fillRect(p.x+p.w+5,p.y+15,3,3);
}
function drawHUD(){
ctx.fillStyle="rgba(10,16,26,.45)"; ctx.fillRect(14,14,420,110);
ctx.strokeStyle="rgba(255,255,255,.18)"; ctx.strokeRect(14,14,420,110);
ctx.fillStyle="#fff"; ctx.font="bold 22px Inter,Arial";
ctx.fillText(`Score: ${score}`,24,42);
ctx.fillText(`Time: ${timeLeft}s`,24,70);
ctx.fillText(`Combo x${combo}`,200,42);
ctx.fillText(`Streak ${streak}`,200,70);
ctx.font="bold 15px Inter,Arial";
ctx.fillText(`Mission: ${mission.progress}/${mission.target} (+${mission.reward})`,24,98);
ctx.fillText(`Event: ${eventName} ${eventLeft>0?`(${eventLeft}s)`:""}`,24,118);
}
function render(){
drawBG();
fruits.forEach(f=>{
const y=f.y+Math.sin(f.b)*3; f.b+=.05;
ctx.fillStyle="#ff7a45"; ctx.beginPath(); ctx.arc(f.x,y,f.r,0,Math.PI*2); ctx.fill();
});
rocks.forEach(r=>{ ctx.fillStyle="#7b818a"; ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.fill(); });
drawCapy(); drawHUD();
}

/* Loop */
function loop(){
if(!run) return;

if(keys["ArrowLeft"]||keys["a"]) p.x-=p.s;
if(keys["ArrowRight"]||keys["d"]) p.x+=p.s;
if(keys["ArrowUp"]||keys["w"]) p.y-=p.s;
if(keys["ArrowDown"]||keys["s"]) p.y+=p.s;
if(touch){ p.x += Math.sign(touch.x-(p.x+p.w/2))*p.s; p.y += Math.sign(touch.y-(p.y+p.h/2))*p.s; }

p.x=clamp(p.x,14,980-p.w-14); p.y=clamp(p.y,260,560-p.h-14);

rocks.forEach(r=>{
r.x+=r.vx; r.y+=r.vy;
if(r.x<22||r.x>958) r.vx*=-1; if(r.y<275||r.y>540) r.vy*=-1;
});

if(comboT>0) comboT--; else combo=1;

for(let i=fruits.length-1;i>=0;i--){
const f=fruits[i];
if(hitRectCircle(p.x,p.y,p.w,p.h,f.x,f.y,f.r)){
combo=Math.min(combo+1,5); comboT=180;
let gained=10*combo;

if(eventName==="Golden Rain") gained*=2;
if(eventName==="Fever Mode") gained+=5;

score+=gained; addPts(gained);
mission.progress++;
fruits.splice(i,1); spawnFruit();

if(mission.progress>=mission.target){
score+=mission.reward; addPts(mission.reward);
mission.progress=0; newMission();
}
unlockSkinByScore();
}
}

render();
requestAnimationFrame(loop);
}

/* Timers */
setInterval(()=>{
if(!run) return;
let idle=1;
if(eventName==="Calm Flow") idle=2;
score+=idle; addPts(idle);
},3000);

setInterval(async ()=>{
if(!run) return;
timeLeft--;
if(eventLeft>0) eventLeft--;
if(timeLeft%20===0 && eventLeft===0) startEvent();

if(timeLeft<=0){
run=false;
await commit(); // endGame commit
timeLeft=60; eventLeft=0; eventName="None";
run=true; requestAnimationFrame(loop);
}
},1000);

/* Input */
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);
cv.addEventListener("touchstart",e=>{const t=e.touches[0],r=cv.getBoundingClientRect();touch={x:t.clientX-r.left,y:t.clientY-r.top};},{passive:true});
cv.addEventListener("touchmove",e=>{const t=e.touches[0],r=cv.getBoundingClientRect();touch={x:t.clientX-r.left,y:t.clientY-r.top};},{passive:true});
cv.addEventListener("touchend",()=>touch=null);

/* Start */
applyDailyStreak();
for(let i=0;i<9;i++) spawnFruit();
for(let i=0;i<5;i++) spawnRock();
newMission();
render();
requestAnimationFrame(loop);
</script>
</body>
</html>
