<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Capybara Idle + Active</title>
<style>
* { box-sizing: border-box; }
body{
margin:0;
background:#0d1117;
color:#fff;
font-family:Arial, sans-serif;
display:grid;
place-items:center;
height:100vh;
overflow:hidden;
}

canvas{
border:1px solid #333;
background:linear-gradient(#7fd3ff 0 55%, #6ac66a 55%);
max-width:95vw;
height:auto;
cursor:pointer;
}
</style>
</head>
<body>
<canvas id="c" width="900" height="500"></canvas>

<script>
const c = document.getElementById('c');
const x = c.getContext('2d');

let keys = {};
let run = false;
let score = 0;
let lives = 3;
let gameOver = false;

const p = { x:100, y:360, w:60, h:38, s:5 };
let fruits = [];
let rocks = [];

// Idle + Active Bonus
let isTabVisible = true;
let lastMoveAt = 0;
const idleTickMs = 3000;
const idlePoint = 1;
const activeBonus = 2;

// touch controls
let touchTarget = null;

function R(a,b){ return Math.random()*(b-a)+a; }

function spawnFruit(){
fruits.push({ x:R(50,850), y:R(220,460), r:10 });
}

function spawnRock(){
rocks.push({
x:R(50,850), y:R(220,460), r:14,
vx:R(-1,1), vy:R(-1,1)
});
}

function hitRectCircle(px,py,pw,ph,cx,cy,cr){
const tx = Math.max(px, Math.min(cx, px+pw));
const ty = Math.max(py, Math.min(cy, py+ph));
const dx = cx - tx, dy = cy - ty;
return dx*dx + dy*dy <= cr*cr;
}

function resetGame(){
score = 0;
lives = 3;
gameOver = false;
p.x = 100; p.y = 360;
fruits = [];
rocks = [];
for(let i=0;i<6;i++) spawnFruit();
for(let i=0;i<4;i++) spawnRock();
lastMoveAt = Date.now();
}

function drawHUD(){
x.fillStyle = "rgba(0,0,0,.45)";
x.fillRect(10,10,260,58);

x.fillStyle = "#fff";
x.font = "bold 18px Arial";
x.fillText("Score: " + score, 20, 34);
x.fillText("Lives: " + lives, 20, 58);
}

function drawScene(){
x.clearRect(0,0,c.width,c.height);

// Sun
x.fillStyle = "rgba(255,255,255,.75)";
x.beginPath();
x.arc(820, 70, 28, 0, Math.PI*2);
x.fill();

// River
x.fillStyle = "#49bff7";
x.fillRect(0, 380, c.width, 60);

// Fruits
for(const f of fruits){
x.fillStyle = "#ff7043";
x.beginPath();
x.arc(f.x, f.y, f.r, 0, Math.PI*2);
x.fill();
}

// Rocks
for(const r of rocks){
x.fillStyle = "#777";
x.beginPath();
x.arc(r.x, r.y, r.r, 0, Math.PI*2);
x.fill();
}

// Capybara
x.fillStyle = "#8d6e63";
x.fillRect(p.x, p.y, p.w, p.h);
x.fillStyle = "#6d4c41";
x.fillRect(p.x + p.w - 10, p.y + 8, 20, 20);
x.fillStyle = "#111";
x.fillRect(p.x + p.w + 3, p.y + 14, 3, 3);

drawHUD();

if (gameOver) {
x.fillStyle = "rgba(0,0,0,.45)";
x.fillRect(250, 200, 400, 90);
x.fillStyle = "#fff";
x.font = "bold 28px Arial";
x.fillText("Game Over! Click to Restart", 285, 255);
}
}

function gameLoop(){
if(!run) return;

let moved = false;

if(keys["ArrowLeft"] || keys["a"] || keys["A"]){ p.x -= p.s; moved = true; }
if(keys["ArrowRight"]|| keys["d"] || keys["D"]){ p.x += p.s; moved = true; }
if(keys["ArrowUp"] || keys["w"] || keys["W"]){ p.y -= p.s; moved = true; }
if(keys["ArrowDown"] || keys["s"] || keys["S"]){ p.y += p.s; moved = true; }

// touch follow
if(touchTarget){
const dx = touchTarget.x - (p.x + p.w/2);
const dy = touchTarget.y - (p.y + p.h/2);
p.x += Math.sign(dx) * Math.min(Math.abs(dx), p.s);
p.y += Math.sign(dy) * Math.min(Math.abs(dy), p.s);
moved = true;
}

if(moved) lastMoveAt = Date.now();

p.x = Math.max(10, Math.min(c.width - p.w - 10, p.x));
p.y = Math.max(200, Math.min(c.height - p.h - 10, p.y));

// Move rocks
for(const r of rocks){
r.x += r.vx; r.y += r.vy;
if(r.x < 20 || r.x > c.width - 20) r.vx *= -1;
if(r.y < 200 || r.y > c.height - 20) r.vy *= -1;
}

// Collect fruits
for(let i = fruits.length - 1; i >= 0; i--){
const f = fruits[i];
if(hitRectCircle(p.x,p.y,p.w,p.h,f.x,f.y,f.r)){
score += 10;
fruits.splice(i,1);
spawnFruit();
}
}

// Hit rocks
for(const r of rocks){
if(hitRectCircle(p.x,p.y,p.w,p.h,r.x,r.y,r.r)){
lives--;
p.x = 100; p.y = 360;
if(lives <= 0){
run = false;
gameOver = true;
}
break;
}
}

drawScene();
requestAnimationFrame(gameLoop);
}

// Idle points loop
setInterval(() => {
if(!run) return;
if(!isTabVisible) return; // hidden tab => no idle points

score += idlePoint;
const recentlyActive = (Date.now() - lastMoveAt) < 4000;
if(recentlyActive) score += activeBonus;
}, idleTickMs);

// Visibility anti-abuse
document.addEventListener("visibilitychange", () => {
isTabVisible = (document.visibilityState === "visible");
});

// Keyboard
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Touch controls
c.addEventListener("touchstart", (e) => {
e.preventDefault();
const t = e.touches[0], rect = c.getBoundingClientRect();
touchTarget = { x: t.clientX - rect.left, y: t.clientY - rect.top };
}, { passive:false });

c.addEventListener("touchmove", (e) => {
e.preventDefault();
const t = e.touches[0], rect = c.getBoundingClientRect();
touchTarget = { x: t.clientX - rect.left, y: t.clientY - rect.top };
}, { passive:false });

c.addEventListener("touchend", () => {
touchTarget = null;
});

// Click to start/restart
c.addEventListener("click", () => {
if (!run) {
resetGame();
run = true;
drawScene();
requestAnimationFrame(gameLoop);
}
});

// Auto start on load
resetGame();
run = true;
drawScene();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
